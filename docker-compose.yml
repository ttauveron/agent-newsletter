services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_SUPERUSER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      NEWSLETTER_ENGINE_DB_USER: ${NEWSLETTER_ENGINE_DB_USER}
      NEWSLETTER_ENGINE_DB_PASSWORD: ${NEWSLETTER_ENGINE_DB_PASSWORD}
      HERMES_DB_USER: ${HERMES_DB_USER}
      HERMES_DB_PASSWORD: ${HERMES_DB_PASSWORD}
      LITELLM_DB_USER: ${LITELLM_DB_USER}
      LITELLM_DB_PASSWORD: ${LITELLM_DB_PASSWORD}
      LITELLM_DB_NAME: ${LITELLM_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: postgresql://${LITELLM_DB_USER}:${LITELLM_DB_PASSWORD}@postgres:5432/${LITELLM_DB_NAME}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
      - public
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  newsletter-engine:
    build:
      context: .
      dockerfile: newsletter-engine/Dockerfile
    environment:
      DATABASE_URL: postgresql://${NEWSLETTER_ENGINE_DB_USER}:${NEWSLETTER_ENGINE_DB_PASSWORD}@postgres:5432/${POSTGRES_DB}
      LITELLM_BASE_URL: http://litellm:4000/v1
      LITELLM_ENRICHMENT_KEY: ${LITELLM_ENRICHMENT_KEY}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-gmail}
      LOCAL_MAILBOX_DIR: ${LOCAL_MAILBOX_DIR:-/app/config/dev_mailbox}
      ENRICHMENT_BACKEND: ${ENRICHMENT_BACKEND:-anthropic}
      GMAIL_CLIENT_SECRET_PATH: ${GMAIL_CLIENT_SECRET_PATH:-/app/config/client_secret.json}
      GMAIL_TOKEN_PATH: ${GMAIL_TOKEN_PATH:-/app/config/gmail_token.json}
      GMAIL_AUTH_PORT: ${GMAIL_AUTH_PORT:-8888}
      HERMES_WEBHOOK_URL: http://hermes:8644
      HERMES_WEBHOOK_SECRET: ${HERMES_WEBHOOK_SECRET}
      NEWSLETTER_ENGINE_URL: http://newsletter-engine:8000
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_healthy
    volumes:
      - ./config:/app/config
    ports:
      - "${NEWSLETTER_ENGINE_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - backend
      - public

  hermes:
    image: nousresearch/hermes-agent:latest
    command: gateway run
    environment:
      DATABASE_URL: postgresql://${HERMES_DB_USER}:${HERMES_DB_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEWSLETTER_ENGINE_URL: http://newsletter-engine:8000
      LITELLM_HERMES_KEY: ${LITELLM_HERMES_KEY}
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_KEY: ${HERMES_API_KEY}
      WEBHOOK_ENABLED: "true"
      WEBHOOK_PORT: "8644"
      WEBHOOK_SECRET: ${HERMES_WEBHOOK_SECRET}
      GATEWAY_ALLOW_ALL_USERS: "true"
      HERMES_YOLO_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      newsletter-engine:
        condition: service_healthy
      litellm:
        condition: service_healthy
    volumes:
      - ./hermes/config.yaml:/root/.hermes/config.yaml:ro
      - ./hermes/config.yaml:/opt/data/config.yaml:ro
      - ./hermes/SOUL.md:/root/.hermes/SOUL.md:ro
      - ./hermes/webhook_subscriptions.json:/opt/data/webhook_subscriptions.json:ro
      - ./config:/app/config:ro
      - hermes_data:/root/.hermes/data
    ports:
      - "8642:8642"
      - "8644:8644"
    networks:
      - backend

volumes:
  postgres_data:
  hermes_data:

networks:
  backend:
    internal: true
  public: {}
