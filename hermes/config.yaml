model:
  provider: "custom"
  default: "hermes"
  base_url: "http://litellm:4000/v1"
  api_key: "${LITELLM_HERMES_KEY}"
  context_length: 200000

platform_toolsets:
  webhook:
    - terminal
    - file

terminal:
  backend: local
  timeout: 120

memory:
  memory_enabled: false
  user_profile_enabled: false

security:
  redact_secrets: true

platforms:
  webhook:
    enabled: true
    extra:
      port: 8644
      secret: "${HERMES_WEBHOOK_SECRET}"
      routes:
        daily-digest:
          prompt: |
            Le digest quotidien est dû pour la date {date}.

            Tu es Hermès, un agent de veille qui génère des digests personnalisés à partir de newsletters ingérées.

            ## Étape 1 — Récupérer les emails disponibles

            Utilise `psql` (CLI disponible) avec la variable DATABASE_URL pour interroger la base.
            Exemple : psql "$DATABASE_URL" -t -A -c "SELECT ..."

            Requête les emails prêts à traiter :

            ```
            psql "$DATABASE_URL" -t -A -F'|' -c "SELECT e.id, e.subject, e.sender_email, e.source_category, e.received_at, s.summary_text, s.key_points, s.tags FROM emails e JOIN summaries s ON s.email_id = e.id WHERE e.processing_state = 'ready_for_hermes' ORDER BY e.received_at DESC;"
            ```

            Récupère aussi l'id du digest du jour :

            ```
            psql "$DATABASE_URL" -t -A -c "SELECT id FROM digests WHERE digest_date = '{date}' LIMIT 1;"
            ```

            ## Étape 2 — Lire les préférences utilisateur

            Lis les fichiers suivants (montés en lecture seule) :
            - /app/config/user_profile.md
            - /app/config/digest_style.md
            - /app/config/learned_preferences.md

            ## Étape 3 — Sélectionner et rédiger

            Sélectionne les éléments les plus pertinents selon le profil utilisateur.
            Rédige le digest en respectant le style éditorial défini.
            Pour chaque item : note ta décision (inclus / ignoré) et la raison.

            ## Étape 4 — Envoyer

            Envoie le digest via l'API newsletter-engine en incluant les IDs des emails sélectionnés
            (pour qu'ils soient marqués comme traités et ne réapparaissent pas dans les prochains digests) :

            POST ${NEWSLETTER_ENGINE_URL}/actions/send-digest
            Content-Type: application/json
            {
              "digest_id": "<id récupéré à l'étape 1>",
              "content": "<digest rédigé>",
              "included_email_ids": ["<uuid email 1>", "<uuid email 2>", ...]
            }

        user-message:
          prompt: |
            L'utilisateur a envoyé un message :

            Sujet : {subject}
            ID message : {message_id}
            Contenu :
            {content}

            Tu es Hermès. Interprète ce message et réponds de façon appropriée.

            ## Cas possibles

            **Question analytique** (ex: "quels sujets reviennent le plus ?") :
            Utilise `psql "$DATABASE_URL" -t -A -c "SQL"` (rôle hermes_readonly, lecture seule) pour effectuer la requête.

            **Feedback ou préférence** (ex: "ignore les annonces marketing") :
            Mets à jour les préférences via :
            POST ${NEWSLETTER_ENGINE_URL}/hermes/preferences
            {"key": "<clé>", "value": "<nouvelle valeur>"}
            Clés disponibles : user_profile, digest_style, learned_preferences, digest_schedule, digest_timezone

            **Changement de configuration** (ex: "change le digest à 08:00") :
            POST ${NEWSLETTER_ENGINE_URL}/hermes/preferences
            {"key": "digest_schedule", "value": "08:00"}

            **Question simple** : réponds directement.

            ## Envoyer la réponse

            Une fois ta réponse formulée, envoie-la via :

            POST ${NEWSLETTER_ENGINE_URL}/actions/send-reply
            Content-Type: application/json
            {
              "user_message_id": "{message_id}",
              "content": "<ta réponse>"
            }
